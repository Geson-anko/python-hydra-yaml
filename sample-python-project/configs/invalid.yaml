# 異常系テスト
# 無効な_target_パス
bad_target:
  _target_: not.exist.module

# 循環参照
circular1:
  value: ${..circular2.value}
circular2:
  value: ${..circular1.value}

# 無効な_partial_値
bad_partial:
  _target_: torch.nn.Linear
  _partial_: "invalid"

# 無効な_convert_値
bad_convert:
  _target_: torch.nn.Linear
  _convert_: "invalid"

# ファイル階層を超える参照
out_of_bounds:
  value: ${....value}

# 存在しない参照
missing_ref:
  value: ${not.exist.path}

# hydra.utils関数で必要なpathフィールドの欠落
missing_path:
  _target_: hydra.utils.get_class
